<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Educational food waste simulator game for kids ages 4-15">
    <title>Food Waste Simulator - Learn to Reduce Waste!</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading screen (shown before Phaser loads) -->
    <div id="loading-screen">
        <div class="loading-content">
            <h1>🍎 Food Waste Simulator</h1>
            <p>Loading...</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>
    
    <!-- Main game container -->
    <div id="game-container"></div>
    
    <!-- Info footer -->
    <div id="game-info">
        <p>
            🎮 An educational game about reducing food waste
            | Ages 4-15 
            | Press <kbd>?</kbd> for help
        </p>
    </div>
    
    <!-- Phaser.js Library (CDN for fast prototyping) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    
    <!-- Core Models (must load before scenes) -->
    <script src="js/models/FoodItem.js"></script>
    <script src="js/models/Inventory.js"></script>
    <script src="js/models/Household.js"></script>
    <script src="js/models/StochasticModel.js"></script>
    
    <!-- Scenes (must load before config) -->
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/SetupScene.js"></script>
    <script src="js/scenes/ManagementScene.js"></script>
    <script src="js/scenes/GroceryTravelScene.js"></script>
    <script src="js/scenes/ShoppingMinigame.js"></script>
    <script src="js/scenes/CookingMinigame.js"></script>
    <script src="js/scenes/FridgeMinigame.js"></script>
    <script src="js/scenes/PlanningMinigame.js"></script>
    <script src="js/scenes/SessionSummaryScene.js"></script>
    
    <!-- UI Components -->
    <script src="js/ui/Tutorial.js"></script>
    <script src="js/ui/HelpSystem.js"></script>
    <script src="js/ui/HydraGuide.js"></script>
    
    <!-- Game Configuration (must load after scenes are defined) -->
    <script src="js/config.js"></script>
    
    <!-- Main entry point (must be last) -->
    <script src="js/main.js"></script>
    
    <script>
        // Hide loading screen once Phaser is ready
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }
            }, 1000);
        });
    </script>
</body>
</html>
